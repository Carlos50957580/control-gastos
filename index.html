<!DOCTYPE html>
<html>
<head>
  <title>Control de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Control Financiero</h2>

<div id="registro">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <input type="number" id="balanceInicial" placeholder="Balance Inicial">
  <button onclick="guardarUsuario()">Guardar</button>
</div>

<div id="menu" style="display:none;">
  <h3 id="bienvenida"></h3>
  <h2 id="balance"></h2>

  <button onclick="mostrarFormulario('Deposito')">Depósito</button>
  <button onclick="mostrarFormulario('Retiro')">Retiro</button>
  <button onclick="mostrarFormulario('Gasto')">Gasto</button>
  <button onclick="mostrarFormulario('Cheque')">Cheque</button>
  <button onclick="verHistorial()">Historial</button>
</div>

<div id="formulario" style="display:none;">
  <input type="date" id="fecha">
  <input type="text" id="concepto" placeholder="Concepto">
  <input type="number" id="monto" placeholder="Monto">
  <button onclick="guardarTransaccion()">Guardar</button>
</div>

<div id="historial"></div>

<script type="module" src="app.js"></script>
</body>
</html>
